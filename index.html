		<form id="some-form">
            <section id="input">
            <!-- name -->        
                <section>
                    <label for="recipe-name">Name Your Recipe</label>
                    <input id="recipe-name" name="recipe-name" placeholder="Name your recipe" required type="text">
                </section>

            <!-- dropdown -->
                <section>
                    <label for="occasion">What is the occasion?</label>
                    <select id="occasion" name="occasion">
                        <option>Brunch</option>
                        <option>Casual Weeknight</option>
                        <option>Weekend Fun</option>
                        <option>Dinner Party</option>
                        <option>Celebrating something</option>
                        <option>Date Night</option>
                        <option>Flexible</option>
                    </select>
                </section>

            <!-- 2 sliders -->    
                <section>
                    <label for="alc-scale">Alcoholic Scale</label>
                    <input type="range" id="alc-scale" name="alc-scale" min="0" max="10" value="5">
                </section>

                <section>
                    <label for="adv-scale">Adventure Scale</label>
                    <input type="range" id="adv-scale" name="adv-scale" min="0" max="10" value="5">
                </section>
