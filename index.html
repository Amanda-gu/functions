<!DOCTYPE html>
<html>
    <head>
        <title>Functions</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">

         <style>
	        @import 'reset.css' layer(reset);
            @import 'style.css' layer(page);
        </style>
		<!-- <script defer src="assets/weather.js"></script> -->
        <script defer src="assets/scripts.js"></script>
        <script defer src="assets/scripts.js"></script>
         <script defer src="assets/html2canvas.min.js"></script>
    </head>

    <body>
            <section id="intro">
                <hgroup>
                    <h1>Mixed Signals</h1>
                    <h2>Design your drink.</h2>
                </hgroup>

                <form>
                    <section id="input">
                    
                        <!-- dropdown -->
                            <section>
                                <label for="occasion">What is the vibe?</label>

                                <section id="occasion-wrapper">
                                    <select id="occasion" name="occasion">
                                        <option>Brunch</option>
                                        <option>Casual Weeknight</option>
                                        <option>Weekend Fun</option>
                                        <option>Dinner Party</option>
                                        <option>Celebrating something</option>
                                        <option>Date Night</option>
                                        <option>Flexible</option>
                                    </select>
                                </section>

                              
                            </section>

                        <!-- 2 sliders -->    
                            <section>
                                <label for="alc-scale">How strong do you want it?</label>
                                <section class="slider">
                                    <input type="range" id="alc-scale" name="alc-scale" min="0" max="10" value="5">
                                    <section id="alc-micro-copy">
                                        <p>low</p>
                                        <p>1–10</p>
                                        <p>strong</p>
                                    </section>
                                </section>
                            </section>

                            <section>
                                <label for="adv-scale">How adventurous is your palate today?</label>
                                <section class="slider">
                                    <input type="range" id="adv-scale" name="adv-scale" min="0" max="10" value="5">
                                    <section id="adv-micro-copy">
                                        <p>safe</p>
                                        <p>1–10</p>
                                        <p>adventurous</p>
                                    </section>
                                </section>
                            </section>
                    </section>
                    
                    <button id="mix" type="mix" class="main-cta">Mix it</button>
                    <!-- <button id="saved" type="saved">see saved recipes</button> -->
                <!-- location -->    
                    <!-- <section> -->
                        <!-- geolocation api: https://developer.mozilla.org/en-US/docs/Web/API/Geolocation_API/Using_the_Geolocation_API-->
                        <!-- live example: https://www.w3schools.com/html/tryit.asp?filename=tryhtml5_geolocation -->
                        <!-- <button id="find-me">Make it match the weather</button>
                        <p id="location"></p>
                    </section> -->
                <!-- buttons -->                    
                </form>
        </section>

        <!-- output -->    
  
        <dialog id="result-modal">

                <section id="card">

                    <section id="ingredient-list">
                    </section>
                    
                </section>

                <section>
                        <button id="mix-again" type="mix-again" class="main-cta">Mix Again</button>
                        <button id="share" class="secondary-cta">Share</button>
                </section>
                
                <button id="close" type="close">make another drink</button>

        </dialog>


        <div id="glass-bg">
            <img src="assets/glasses/margarita.svg" alt="Margarita Glass">
            <img src="assets/glasses/collins.svg" alt="Collins Glass">
            <img src="assets/glasses/highball.svg" alt="Highball Glass">
            <img src="assets/glasses/sour.svg" alt="Sour Glass">
            <img src="assets/glasses/martini.svg" alt="Martini Glass">
            <img src="assets/glasses/punch.svg" alt="Punch Glass">
            <img src="assets/glasses/spritz.svg" alt="Spritz Glass">
            <img src="assets/glasses/negroni.svg" alt="Negroni Glass">
             <img src="assets/glasses/old fashioned.svg" alt="Old Fashioned Glass">
        </div>


	</body>
</html>
