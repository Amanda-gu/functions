<!DOCTYPE html>
<html>
    <head>
        <title>Functions</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">

         <style>
	        /* @import 'reset.css' layer(reset); */
            @import 'style.css' layer(page);
        </style>
		<script defer src="script.js"></script>
    </head>

    <body>
		
		<h1>Ganbei</h1>

		<form id="some-form">

        <!-- name -->        
            <section>
                <label for="recipe-name">Name Your Recipe</label>
                <input id="recipe-name" name="recipe-name" placeholder="Name your recipe" required type="text">
            </section>

        <!-- dropdown -->
            <section>
                <label for="some-option">What is the occasion?</label>
				<select id="some-option" name="some-option">
                    <option>Brunch</option>
                    <option>Casual Weeknight</option>
                    <option>Weekend Fun</option>
                    <option>Dinner Party</option>
                    <option>Brunch</option>
                    <option>Celebrating something</option>
                    <option>Date Night</option>
                    <option>I'm flexible</option>
				</select>
			</section>

        <!-- 2 sliders -->    
			<section>
				<label for="some-range">Alcoholic Scale</label>
				<input type="range" id="some-range" name="some-range" min="0" max="11" value="5">
			</section>

            <section>
				<label for="some-range">Adventure Scale</label>
				<input type="range" id="some-range" name="some-range" min="0" max="11" value="5">
			</section>
		<!-- location -->    
            <section>
                <!-- geolocation api: https://developer.mozilla.org/en-US/docs/Web/API/Geolocation_API/Using_the_Geolocation_API-->
                <!-- live example: https://www.w3schools.com/html/tryit.asp?filename=tryhtml5_geolocation -->
				<button id="find-me">Make it match the weather</button>
                <p id="location"></p>
			</section>
        

        <!-- buttons -->        
            <section>
                <button type="reset">Reset</button>
                <button type="reset">Mix it</button>
                <button>Surprise Me</button>
            </section>

        <!-- output -->    
            <output for="amount" form="my-form">
                <article>
                    <h3 id="card-recipe-name">name</h3>
                    <p>description</p>
                    <section id="ingredients">
                        <p>faergaer</p>
                    </section>
                    <section id="instructions">
                        <p>gaergaerg</p>
                    </section>

                </article>
            </output>

		</form>


	</body>
</html>
