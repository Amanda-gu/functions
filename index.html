    <body>
        <section id="page-intro-container">
            <section id="page-intro">
                <h1>Mixed</h1>
                <img src="assets/glasses/glass.gif" alt="glass gif">
                <h1>Signals</h1>
            </section>
        </section>
        <main>
            <section id="intro">
                <hgroup>
                    <h1>Mixed&nbsp;Signals</h1>
                    <h2>Design your drink.</h2>
                </hgroup>

                <form>
                    <section id="input">
                    
                        <!-- dropdown -->
                            <section>
                                <label for="occasion">What is the vibe?</label>

                                <section id="occasion-wrapper">
                                    <select id="occasion" name="occasion">
                                        <option>Brunch</option>
                                        <option>Casual Weeknight</option>
                                        <option>Weekend Fun</option>
                                        <option>Dinner Party</option>
                                        <option>Celebrating something</option>
                                        <option>Date Night</option>
                                        <option>Flexible</option>
                                    </select>
                                </section>

                              
                            </section>

                        <!-- 2 sliders -->    
                            <section>
                                <label for="alc-scale">How strong do you want it?</label>
                                <section class="slider">
                                    <input type="range" id="alc-scale" name="alc-scale" min="0" max="10" value="5">
                                    <section id="alc-micro-copy">
                                        <p>low</p>
                                        <p>1–10</p>
                                        <p>strong</p>
                                    </section>
                                </section>
                            </section>

                            <section>
                                <label for="adv-scale">How adventurous is your palate today?</label>
                                <section class="slider">
                                    <input type="range" id="adv-scale" name="adv-scale" min="0" max="10" value="5">
                                    <section id="adv-micro-copy">
                                        <p>safe</p>
                                        <p>1–10</p>
                                        <p>adventurous</p>
                                    </section>
                                </section>
                            </section>
                    </section>
                    
                    <button id="mix" type="mix" class="main-cta-inverted">Mix it</button>
                    <!-- <button id="saved" type="saved">see saved recipes</button> -->
                <!-- location -->    
                    <!-- <section> -->
                        <!-- geolocation api: https://developer.mozilla.org/en-US/docs/Web/API/Geolocation_API/Using_the_Geolocation_API-->
                        <!-- live example: https://www.w3schools.com/html/tryit.asp?filename=tryhtml5_geolocation -->
                        <!-- <button id="find-me">Make it match the weather</button>
                        <p id="location"></p>
                    </section> -->
                <!-- buttons -->                    
                </form>
                <!-- output -->    
          
                <dialog id="result-modal">
        
                        <section id="card">
        
                            <section id="ingredient-list">
                            </section>
                            
                        </section>
        
                        <section id="card-buttons">
                                <button id="mix-again" type="mix-again" class="main-cta">Re-mix</button>
                                <button id="share" type="share" class="secondary-cta">Share</button>
                        </section>
                        
                        <button id="close" type="close">make another drink</button>
        
                </dialog>
        </section>
        </main>
        <footer>
			<p>
				Design by <a href="https://amanda-gu.github.io/">Amanda Guo</a> 
			</p>
		</footer>
